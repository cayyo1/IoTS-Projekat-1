services:
  postgres:
    image: postgres:16
    container_name: iot-postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iot_db

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - ./data:/data
  
  rest-service:
    build: ./RESTService
    container_name: rest-service

    ports:
      - "5000:8080"

    depends_on:
      - postgres

  graphql-service:
    build: ./GraphQLService
    container_name: graphql-service

    ports:
      - "3000:3000"

    depends_on:
      - postgres

  grpc-service:
    build: ./gRPCService
    container_name: grpc-service

    ports:
      - "6000:8080"

    depends_on:
      - postgres
    
volumes:
  postgres-data: